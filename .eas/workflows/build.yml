name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  preview_build:
    name: Preview APK (Android)
    type: build
    params:
      platform: android
      profile: preview

  production_build:
    name: Production Build
    type: build
    if: ${{ github.ref_type == 'tag' }}
    params:
      platform: android
      profile: production
