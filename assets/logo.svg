<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Xpress Vet">
  <!-- Blue rounded-square background -->
  <rect width="100" height="100" rx="22" fill="#2563EB"/>

  <!--
    Paw print: 4 toe pads + 1 palm pad
    Visual center of paw: ~(50, 50)
    Colour: white (#FFFFFF)
  -->

  <!-- Palm pad — large oval at bottom-centre -->
  <ellipse cx="50" cy="63" rx="21" ry="17" fill="#FFFFFF"/>

  <!-- Far-left toe (rotated -15°) -->
  <ellipse cx="27" cy="37" rx="9" ry="11" fill="#FFFFFF"
           transform="rotate(-15 27 37)"/>

  <!-- Inner-left toe (rotated -5°) -->
  <ellipse cx="38.5" cy="29.5" rx="8" ry="9.5" fill="#FFFFFF"
           transform="rotate(-5 38.5 29.5)"/>

  <!-- Inner-right toe (rotated +5°) -->
  <ellipse cx="61.5" cy="29.5" rx="8" ry="9.5" fill="#FFFFFF"
           transform="rotate(5 61.5 29.5)"/>

  <!-- Far-right toe (rotated +15°) -->
  <ellipse cx="73" cy="37" rx="9" ry="11" fill="#FFFFFF"
           transform="rotate(15 73 37)"/>
</svg>
